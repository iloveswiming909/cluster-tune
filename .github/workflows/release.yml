name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build signed release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Decode release keystore
        run: |
          mkdir -p "$RUNNER_TEMP/clustertune"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/clustertune/release.jks"
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Test
        run: ./gradlew testDebugUnitTest

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/clustertune/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Prepare release assets
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk "release/ClusterTune-v${version}.apk"
          sha256sum "release/ClusterTune-v${version}.apk" > "release/ClusterTune-v${version}.apk.sha256"

      - name: Create GitHub release
        run: |
          gh release create "$GITHUB_REF_NAME" release/* \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
